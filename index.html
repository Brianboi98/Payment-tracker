<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Pembayaran</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f7f4ef;
      font-family: Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container { width: 100%; max-width: 540px; }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      color: #1a1a1a;
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }

    .summary {
      font-size: 0.75rem;
      color: #999;
      font-family: monospace;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0dbd4;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .col-header {
      display: grid;
      grid-template-columns: 1fr 120px 40px;
      padding: 0.6rem 1.2rem;
      border-bottom: 1px solid #e0dbd4;
      background: #faf9f7;
    }

    .col-header span {
      font-size: 0.65rem;
      color: #aaa;
      font-family: monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .col-header span:nth-child(2) { text-align: center; }

    #records { list-style: none; }

    .record-row {
      display: grid;
      grid-template-columns: 1fr 120px 40px;
      align-items: center;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #f0ece6;
      transition: background 0.15s;
    }

    .record-row:hover { background: #faf9f7; }
    .record-row:last-child { border-bottom: none; }

    .record-name {
      font-size: 1rem;
      color: #1a1a1a;
      font-weight: 500;
    }

    .badge {
      cursor: pointer;
      border: none;
      border-radius: 3px;
      padding: 0.3rem 0.75rem;
      font-family: monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.2s;
      text-align: center;
    }

    .badge.paid {
      background: rgba(34,197,94,0.12);
      color: #16a34a;
      border: 1px solid rgba(34,197,94,0.3);
    }

    .badge.unpaid {
      background: rgba(239,68,68,0.1);
      color: #dc2626;
      border: 1px solid rgba(239,68,68,0.25);
    }

    .delete-btn {
      cursor: pointer;
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      line-height: 1;
      padding: 0.25rem;
      border-radius: 3px;
      transition: color 0.15s;
      text-align: center;
      width: 100%;
    }

    .delete-btn:hover { color: #ef4444; }

    .add-section {
      padding: 0.75rem 1.2rem;
      border-top: 1px solid #e0dbd4;
    }

    #add-form {
      display: none;
      gap: 0.5rem;
      align-items: center;
    }

    #add-form.visible { display: flex; }

    #new-name-input {
      flex: 1;
      border: 1px solid #d0cbc4;
      border-radius: 4px;
      padding: 0.45rem 0.75rem;
      font-size: 0.9rem;
      font-family: Georgia, serif;
      outline: none;
      background: #fff;
      color: #1a1a1a;
    }

    #new-name-input:focus { border-color: #999; }

    .btn-add-confirm {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.45rem 1rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: monospace;
    }

    .btn-cancel {
      background: none;
      color: #999;
      border: 1px solid #e0dbd4;
      border-radius: 4px;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      font-size: 0.8rem;
    }

    #btn-add-open {
      background: none;
      border: 1px dashed #c8c2bb;
      color: #aaa;
      border-radius: 4px;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: monospace;
      letter-spacing: 0.05em;
      width: 100%;
      transition: all 0.15s;
    }

    #btn-add-open:hover { border-color: #999; color: #555; }

    .hint {
      margin-top: 1rem;
      font-size: 0.7rem;
      color: #bbb;
      text-align: center;
      font-family: monospace;
    }

    .empty {
      padding: 2rem;
      text-align: center;
      color: #bbb;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
<div class="container">
  <div style="margin-bottom:2rem">
    <h1>Status Pembayaran</h1>
    <div class="summary" id="summary">0 PAID · 0 UNPAID · 0 TOTAL</div>
  </div>

  <div class="card">
    <div class="col-header">
      <span>Nama</span>
      <span>Status</span>
      <span></span>
    </div>

    <ul id="records"></ul>

    <div class="add-section">
      <div id="add-form">
        <input id="new-name-input" type="text" placeholder="Masukkan nama…" />
        <button class="btn-add-confirm" onclick="confirmAdd()">Tambah</button>
        <button class="btn-cancel" onclick="closeForm()">Batal</button>
      </div>
      <button id="btn-add-open" onclick="openForm()">+ Tambah Orang</button>
    </div>
  </div>

  <p class="hint">Klik badge status untuk tukar · Perubahan disimpan otomatik</p>
</div>

<script>
  const KEY = "status-pembayaran-v1";
  let records = [];

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      records = raw ? JSON.parse(raw) : [{ id: 1, name: "Irfan", status: "unpaid" }];
    } catch {
      records = [{ id: 1, name: "Irfan", status: "unpaid" }];
    }
    render();
  }

  function save() {
    localStorage.setItem(KEY, JSON.stringify(records));
    render();
  }

  function render() {
    const list = document.getElementById("records");
    list.innerHTML = "";

    if (records.length === 0) {
      list.innerHTML = '<li class="empty">Tiada rekod lagi.</li>';
    } else {
      records.forEach(r => {
        const li = document.createElement("li");
        li.className = "record-row";
        li.innerHTML = `
          <span class="record-name">${escHtml(r.name)}</span>
          <button class="badge ${r.status}" onclick="toggle(${r.id})">
            ${r.status === "paid" ? "✓ Paid" : "✗ Unpaid"}
          </button>
          <button class="delete-btn" onclick="del(${r.id})" title="Padam">×</button>
        `;
        list.appendChild(li);
      });
    }

    const paid = records.filter(r => r.status === "paid").length;
    const unpaid = records.length - paid;
    document.getElementById("summary").textContent =
      `${paid} PAID · ${unpaid} UNPAID · ${records.length} TOTAL`;
  }

  function toggle(id) {
    records = records.map(r =>
      r.id === id ? { ...r, status: r.status === "paid" ? "unpaid" : "paid" } : r
    );
    save();
  }

  function del(id) {
    records = records.filter(r => r.id !== id);
    save();
  }

  function openForm() {
    document.getElementById("add-form").classList.add("visible");
    document.getElementById("btn-add-open").style.display = "none";
    document.getElementById("new-name-input").focus();
  }

  function closeForm() {
    document.getElementById("add-form").classList.remove("visible");
    document.getElementById("btn-add-open").style.display = "block";
    document.getElementById("new-name-input").value = "";
  }

  function confirmAdd() {
    const input = document.getElementById("new-name-input");
    const name = input.value.trim();
    if (!name) return;
    records.push({ id: Date.now(), name, status: "unpaid" });
    save();
    closeForm();
  }

  document.getElementById("new-name-input").addEventListener("keydown", e => {
    if (e.key === "Enter") confirmAdd();
    if (e.key === "Escape") closeForm();
  });

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  load();
</script>
</body>
</html>
