<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Pembayaran</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f7f4ef;
      font-family: Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { width: 100%; max-width: 540px; }
    h1 {
      font-size: 2rem;
      font-weight: normal;
      color: #1a1a1a;
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }
    .summary {
      font-size: 0.75rem;
      color: #999;
      font-family: monospace;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e0dbd4;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .col-header {
      display: grid;
      grid-template-columns: 1fr 130px;
      padding: 0.6rem 1.4rem;
      border-bottom: 1px solid #e0dbd4;
      background: #faf9f7;
    }
    .col-header span {
      font-size: 0.65rem;
      color: #aaa;
      font-family: monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .col-header span:last-child { text-align: center; }
    .row {
      display: grid;
      grid-template-columns: 1fr 130px;
      align-items: center;
      padding: 0.95rem 1.4rem;
      border-bottom: 1px solid #f0ece6;
      transition: background 0.15s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: #faf9f7; }
    .name {
      font-size: 1rem;
      color: #1a1a1a;
      font-weight: 500;
    }
    .badge {
      cursor: pointer;
      border-radius: 3px;
      padding: 0.3rem 0.75rem;
      font-family: monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      transition: all 0.2s;
      width: 100%;
    }
    .badge.paid {
      background: rgba(34,197,94,0.12);
      color: #16a34a;
      border: 1px solid rgba(34,197,94,0.3);
    }
    .badge.unpaid {
      background: rgba(239,68,68,0.1);
      color: #dc2626;
      border: 1px solid rgba(239,68,68,0.25);
    }
    .hint {
      margin-top: 1rem;
      font-size: 0.7rem;
      color: #bbb;
      text-align: center;
      font-family: monospace;
    }
  </style>
</head>
<body>
<div class="container">
  <div style="margin-bottom:2rem">
    <h1>Status Pembayaran</h1>
    <div class="summary" id="summary"></div>
  </div>
  <div class="card">
    <div class="col-header">
      <span>Nama</span>
      <span>Status</span>
    </div>
    <div id="list"></div>
  </div>
  <p class="hint">Klik badge status untuk tukar · Disimpan otomatik</p>
</div>

<script>
  // Fixed names — edit this list to change names
  const NAMES = ["Manar", "Boi", "Liu", "Boyo", "Tang", "Tang husband", "Engkom"];
  const SAVE_KEY = "spay-statuses-v1";

  // Load saved statuses (just a name->status map)
  function loadStatuses() {
    try {
      return JSON.parse(localStorage.getItem(SAVE_KEY)) || {};
    } catch { return {}; }
  }

  function saveStatuses(statuses) {
    localStorage.setItem(SAVE_KEY, JSON.stringify(statuses));
  }

  let statuses = loadStatuses();

  function getStatus(name) {
    return statuses[name] || "unpaid";
  }

  function toggle(name) {
    statuses[name] = getStatus(name) === "paid" ? "unpaid" : "paid";
    saveStatuses(statuses);
    render();
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    NAMES.forEach(name => {
      const status = getStatus(name);
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <span class="name">${name}</span>
        <button class="badge ${status}" onclick="toggle('${name.replace(/'/g, "\\'")}')">
          ${status === "paid" ? "✓ Paid" : "✗ Unpaid"}
        </button>
      `;
      list.appendChild(row);
    });

    const paidCount = NAMES.filter(n => getStatus(n) === "paid").length;
    document.getElementById("summary").textContent =
      `${paidCount} PAID · ${NAMES.length - paidCount} UNPAID · ${NAMES.length} TOTAL`;
  }

  render();
</script>
</body>
</html>
